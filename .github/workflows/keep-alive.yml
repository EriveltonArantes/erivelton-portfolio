name: Keep-alive dos projetos do portfólio

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backends (evita cold start do Render free)
        run: |
          urls=(
            "https://banco-vitrine-banco-api.onrender.com"
            "https://feira-livre-marketplace-api.onrender.com"
            "https://hotel-vitrine-hotel-api.onrender.com"
            "https://restaurante-oficial-restaurante-api.onrender.com"
            "https://escola-vitrine-escola-api.onrender.com"
            "https://clinica-api-api.onrender.com"
            "https://rede-barbearias-api.onrender.com"
            "https://amigo-fiel-petshop-api.onrender.com"
            "https://academia-teste-pro-academia-api.onrender.com"
            "https://oficina-mecanica-api.onrender.com"
            "https://ead-cursos-api.onrender.com"
            "https://leilao-online-api.onrender.com"
          )
          for url in "${urls[@]}"; do
            echo "Ping: $url"
            curl -s -o /dev/null -w "  -> HTTP %{http_code} em %{time_total}s\n" "$url" || echo "  -> falhou"
          done
