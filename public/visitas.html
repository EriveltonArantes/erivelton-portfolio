<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Visitas</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b0d14;
    color: #e8ecf5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  .card {
    text-align: center;
    padding: 40px 56px;
    border: 1px solid #232838;
    border-radius: 16px;
    background: #10131e;
  }
  .label {
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8f97ad;
    margin-bottom: 12px;
  }
  .numero {
    font-size: 3.5rem;
    font-weight: 700;
    color: #8fb3ff;
    font-variant-numeric: tabular-nums;
  }
  .sub {
    margin-top: 12px;
    font-size: 0.85rem;
    color: #5c6478;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="label">Visitas ao portfólio</div>
    <div class="numero" id="numero">—</div>
    <div class="sub" id="atualizado"></div>
  </div>
  <script>
    fetch("https://api.counterapi.dev/v1/eriveltonarantes-portfolio/visits/")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        document.getElementById("numero").textContent = d.count;
        document.getElementById("atualizado").textContent =
          "Contando desde " + new Date(d.created_at).toLocaleDateString("pt-BR");
      })
      .catch(function () {
        document.getElementById("numero").textContent = "erro";
      });
  </script>
</body>
</html>
